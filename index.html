<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPC STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff2244;--cyan:#00f0ff;--green:#00e676;--gold:#ffd600;--purple:#bf5fff;--bg:#0a0a0f;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;
  min-height:100vh;overflow-x:hidden;padding-bottom:220px;
}

/* ══ NEW DRAG RACING BG ══ */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-drag{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #0a0a0f 0%,
    #1a1a2e 30%,
    #16213e 60%,
    #0f0f23 100%
  );
  background-size:400% 400%;
  animation:bgShift 8s ease infinite;
}
.bg-drag::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 30% 20% at 20% 10%,rgba(255,34,68,.15),transparent 50%),
    radial-gradient(ellipse 25% 15% at 80% 20%,rgba(0,240,255,.12),transparent 50%),
    radial-gradient(ellipse 20% 10% at 40% 80%,rgba(255,214,0,.1),transparent 50%);
  animation:bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes bgPulse{0%{opacity:.6;transform:scale(1);}100%{opacity:1;transform:scale(1.1);}}

.bg-overlay{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(10,10,15,.95),transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%,rgba(20,20,46,.9),transparent 70%);
}
.road-lines{
  position:absolute;left:50%;transform:translateX(-50%);
  bottom:0;width:4px;height:200%;background:repeating-linear-gradient(0deg,#ffd600 0,#ffd600 40px,transparent 40px,transparent 80px);
  animation:roadRace 0.8s linear infinite;opacity:.2;
}
@keyframes roadRace{to{transform:translateX(-50%) translateY(-80px);}}

.drag-car{
  position:absolute;bottom:20px;right:-150px;width:140px;height:70px;
  background:url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTQwIiBoZWlnaHQ9IjcwIiB2aWV3Qm94PSIwIDAgMTQwIDcwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8IS0tIERSQSwgQ0FSIC0tPgo8cGF0aCBkPSJNMCAxNCBDMCAxMCA1IDYgMTAgNiBMMzAgNiBDMzUgNiA0MCAxMCA0MCAxNCBMMzAgNTAgQzI1IDUyIDIwIDQ4IDE1IDQ4IEwxMCA0OCBDNSA0OCAwIDQ0IDAgMzYiIHN0cm9rZT0iI2ZmMjI0NCIgc3Ryb2tlLXdpZHRoPSI0IiBmaWxsPSIjMjIyMjIyIi8+CjxjaXJjbGUgY3g9IjE1IiBjeT0iNTIiIHI9IjgiIGZpbGw9IiMxMTEiIHN0cm9rZT0iI2ZmZDYwMCIgc3Ryb2tlLXdpZHRoPSIyIi8+CjxjaXJjbGUgY3g9IjM1IiBjeT0iNTIiIHI9IjgiIGZpbGw9IiMxMTEiIHN0cm9rZT0iIzAwZjBmZiIgc3Ryb2tlLXdpZHRoPSIyIi8+CjxjaXJjbGUgY3g9IjE1IiBjeT0iNTIiIHI9IjMiIGZpbGw9IiNmZmQyNDQiLz4KPGNpcmNsZSBjeD0iMzUiIGN5PSI1MiIgcj0iMyIgZmlsbD0iIzAwZjBmZiIvPgo8L3N2Zz4K') center/contain no-repeat;
  animation:dragRace 4s linear infinite;filter:drop-shadow(0 0 20px #ff2244);
}
@keyframes dragRace{0%{right:-150px;transform:rotate(-2deg);}50%{right:50%;transform:rotate(1deg) scale(1.05);}100%{right:120%;transform:rotate(-1deg);}}

/* ══ UPGRADED GLOW RING ══ */
.logo-ring{
  position:absolute;inset:-20px;border-radius:50%;
  background:conic-gradient(from 0deg at 50% 50%,
    transparent 0deg,
    #ff2244 20deg,#ffd600 80deg,#00e676 140deg,#00f0ff 200deg,#bf5fff 280deg,
    transparent 360deg);
  mask:radial-gradient(circle closest-side,#0000 calc(100% - 2px),#000 0);
  animation:ultraGlow 2.5s linear infinite;
  box-shadow:
    0 0 30px #ff2244,
    0 0 60px #ffd600,
    inset 0 0 30px rgba(255,255,255,.1);
}
@keyframes ultraGlow{
  0%,100%{filter:hue-rotate(0deg) brightness(1);}
  33%{filter:hue-rotate(90deg) brightness(1.3);}
  66%{filter:hue-rotate(180deg) brightness(1.1);}
  to{filter:hue-rotate(360deg) brightness(1);}
}

/* ══ HEADER ══ */
.header{text-align:center;padding:20px 14px 10px;animation:fadeDown 1s ease-out;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}
.logo-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.kpc-logo{
  width:120px;height:auto;
  filter:drop-shadow(0 0 25px #00f0ff) drop-shadow(0 0 50px #ff2244);
  animation:logoNeon 2s ease-in-out infinite alternate;
}
@keyframes logoNeon{from{filter:drop-shadow(0 0 20px #00f0ff) drop-shadow(0 0 40px #ff2244) brightness(1);}to{filter:drop-shadow(0 0 35px #00f0ff) drop-shadow(0 0 70px #ff2244) brightness(1.2);}}

.store-title{
  font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(45deg,#ff2244,#ffd600,#00f0ff,#00e676);
  background-size:300% 300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:gtextShift 3s linear infinite;
}
@keyframes gtextShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.title-sub{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:rgba(255,255,255,.4);margin-top:4px;}

/* ══ IMPROVED PANELS ══ */
.grid{display:grid;grid-template-columns:1fr;gap:16px;margin:20px 14px 20px;}
.panel{
  border-radius:24px;padding:20px;backdrop-filter:blur(20px);
  position:relative;overflow:hidden;animation:fadeUp 0.8s ease-out;
  border:1px solid rgba(255,255,255,.08);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.panel::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0deg,var(--glow1) 120deg,var(--glow2) 240deg,transparent 360deg);
  animation:borderFlow 4s linear infinite;
  padding:2px;border-radius:24px;
}
@keyframes borderFlow{to{transform:rotate(360deg);}}
.panel-red{--glow1:#ff2244;--glow2:#ffd600;background:linear-gradient(145deg,rgba(255,34,68,.12),rgba(255,34,68,.05));}
.panel-blue{--glow1:#00f0ff;--glow2:#bf5fff;background:linear-gradient(145deg,rgba(0,240,255,.1),rgba(0,240,255,.04));}

.panel-title{
  font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:3px;
  margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;
  color:rgba(255,255,255,.9);
}
.count-badge{
  font-size:10px;font-weight:900;padding:4px 10px;border-radius:25px;
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.panel-red .count-badge{background:linear-gradient(45deg,#ff2244,#ffd600);color:#fff;box-shadow:0 0 15px #ff2244;}
.panel-blue .count-badge{background:linear-gradient(45deg,#00f0ff,#bf5fff);color:#001820;box-shadow:0 0 15px #00f0ff;}

/* ══ CLEANER LIST LAYOUT ══ */
.items-list{padding:0;margin:0;list-style:none;}
.item{
  display:flex;align-items:center;gap:12px;padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.06);transition:all .2s;
  font-size:13px;cursor:pointer;
}
.item:hover{background:rgba(255,255,255,.03);}
.item:last-child{border-bottom:none;}
.cb-wrap{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.cb{
  width:20px;height:20px;border-radius:6px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;
}
.panel-red .cb{border:2px solid rgba(255,34,68,.4);}
.panel-blue .cb{border:2px solid rgba(0,240,255,.4);}
.item.sel .cb{background:var(--red);border-color:var(--red);box-shadow:0 0 12px var(--red);color:#fff;}
.item-name{flex:1;font-weight:600;}
.price{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;}
.panel-red .price{color:#ffd600;}
.panel-blue .price{color:#00e676;}

.qty-wrap{display:flex;align-items:center;gap:4px;opacity:0;pointer-events:none;transform:scale(.8);transition:all .25s;}
.item.sel .qty-wrap{opacity:1;pointer-events:all;transform:scale(1);}
.qty-btn{width:24px;height:24px;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;}
.qty-btn:active{transform:scale(.9);}
.panel-red .qty-btn{background:rgba(255,34,68,.3);color:#fff;}
.panel-blue .qty-btn{background:rgba(0,240,255,.3);color:#001820;}
.qty-num{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;width:28px;text-align:center;color:var(--cyan);}

/* ══ UPGRADED ORDER BAR ══ */
.order-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:linear-gradient(180deg,rgba(10,10,15,.98),rgba(3,7,13,1));
  backdrop-filter:blur(25px);padding:20px 16px;
  transform:translateY(120%);transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  border-top:1px solid rgba(255,255,255,.1);
  box-shadow:0 -8px 40px rgba(0,230,118,.2);
}
.order-bar.on{transform:translateY(0);}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.calc-total{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;line-height:1;}
.curr{font-size:14px;vertical-align:super;color:rgba(255,255,255,.5);}
.order-count{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;}
.chip{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:800;padding:6px 12px;border-radius:25px;
  animation:chipSlide 0.4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 15px rgba(0,0,0,.3);
}
@keyframes chipSlide{from{opacity:0;transform:translateX(20px) scale(.8);}to{opacity:1;transform:translateX(0) scale(1);}}
.chip-gp{background:linear-gradient(135deg,#ff2244,#ff6b00);color:#fff;border:1px solid rgba(255,34,68,.5);}
.chip-cash{background:linear-gradient(135deg,#00f0ff,#bf5fff);color:#001820;border:1px solid rgba(0,240,255,.5);}
.chip-qty{background:linear-gradient(135deg,#ffd600,#00e676);color:#001820;font-size:12px;font-weight:900;width:24px;height:24px;border-radius:50%;justify-content:center;}
.chip-x{cursor:pointer;font-size:12px;font-weight:900;opacity:.7;transition:opacity .2s;margin-left:4px;}
.chip-x:hover{opacity:1;transform:scale(1.2);}

.wa-btn{
  width:100%;padding:14px;border:none;border-radius:16px;
  font-family:'Orbitron',monospace;font-size:12px;font-weight:900;
  background:linear-gradient(135deg,#00c853 0%,#00e676 50%,#00c853 100%);
  color:#001a0f;box-shadow:0 8px 30px rgba(0,200,100,.5);
  transition:all .3s;position:relative;overflow:hidden;
}
.wa-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  transform:translateX(-100%);transition:transform .6s;
}
.wa-btn:hover::before{transform:translateX(300%);}
.wa-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 40px rgba(0,230,118,.7);}

/* ══ MUSIC PLAYER ══ */
.music-player{
  position:fixed;top:20px;right:20px;z-index:500;width:50px;height:50px;
  background:linear-gradient(135deg,#ff2244,#ffd600);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 8px 25px rgba(255,34,68,.4);transition:all .3s;
  font-size:18px;font-weight:900;
}
.music-player:hover{transform:scale(1.1) rotate(180deg);box-shadow:0 12px 35px rgba(255,34,68,.6);}
.music-player.pause{background:linear-gradient(135deg,#666,#999);}

/* ══ TOAST ══ */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  padding:12px 24px;border-radius:30px;font-family:'Orbitron',monospace;font-size:12px;font-weight:800;
  z-index:2000;opacity:0;pointer-events:none;transition:all .4s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:linear-gradient(135deg,#00e676,#00c853);color:#001a0f;box-shadow:0 8px 30px rgba(0,230,118,.5);}
</style>
</head>
<body>

<audio autoplay loop muted id="music">
  <source src="https://raw.githubusercontent.com/lanangwijaya/kpc-store-dds/main/dj_kicau.mp3" type="audio/mpeg">
</audio>

<div class="bg">
  <div class="bg-drag"></div>
  <div class="bg-overlay"></div>
  <div class="road-lines"></div>
  <div class="drag-car"></div>
</div>

<!-- MUSIC BUTTON -->
<div class="music-player" id="musicBtn" title="DJ Kicau Kicau Mania">🎵</div>

<div class="main">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="kpc-logo" src="https://via.placeholder.com/300x300/0a0a0f/00f0ff?text=KPC+STORE" alt="KPC STORE">
    </div>
    <div class="store-title">KPC STORE</div>
    <div class="title-sub">DRAG RACING EDITION</div>
  </div>

  <div class="grid">
    <!-- GP PANEL -->
    <div class="panel panel-red">
      <div class="panel-title">
        💎 GP PREMIUM <span class="count-badge" id="gpCount">0</span>
      </div>
      <ul class="items-list" id="gpList">
        <li class="item" data-price="25000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">GP Reguler</span><span class="price">25K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
        <li class="item" data-price="45000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">GP Platinum</span><span class="price">45K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
        <li class="item" data-price="85000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">GP Diamond</span><span class="price">85K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
      </ul>
    </div>

    <!-- CASH PANEL -->
    <div class="panel panel-blue">
      <div class="panel-title">
        💰 CASH ZONE <span class="count-badge" id="cashCount">0</span>
      </div>
      <ul class="items-list" id="cashList">
        <li class="item" data-price="15000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">Cash 15K</span><span class="price">15K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
        <li class="item" data-price="35000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">Cash 35K</span><span class="price">35K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
        <li class="item" data-price="75000"><div class="cb-wrap"><div class="cb"></div></div><span class="item-name">Cash 75K</span><span class="price">75K</span><div class="qty-wrap"><button class="qty-btn">-</button><span class="qty-num">1</span><button class="qty-btn">+</button></div></li>
      </ul>
    </div>
  </div>
</div>

<!-- ORDER BAR -->
<div class="order-bar" id="orderBar">
  <div class="order-header">
    <div>
      <div class="order-lbl">TOTAL ORDER</div>
      <div class="calc-total">Rp <span id="totalPrice">0</span><span class="curr">IDR</span></div>
      <div class="order-count" id="itemCount">0 item</div>
    </div>
  </div>
  <div class="chips" id="chips"></div>
  <button class="wa-btn" id="orderBtn">📱 ORDER VIA WA</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
class KPCStore {
  constructor() {
    this.cart = [];
    this.music = document.getElementById('bgMusic');
    this.isPlaying = false;
    this.init();
  }

  init() {
    this.bindEvents();
    this.playMusic();
    this.updateUI();
  }

  bindEvents() {
    // Music toggle
    document.getElementById('musicBtn').onclick = () => this.toggleMusic();
    
    // Item interactions
    document.querySelectorAll('.item').forEach(item => {
      item.onclick = (e) => {
        if (e.target.closest('.qty-btn')) return;
        this.toggleItem(item);
      };
    });

    // Quantity controls
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.onclick = (e) => this.changeQty(e.target);
    });

    // Order button
    document.getElementById('orderBtn').onclick = () => this.sendOrder();
  }

  toggleMusic() {
    if (this.isPlaying) {
      this.music.pause();
      this.isPlaying = false;
      document.getElementById('musicBtn').textContent = '🔇';
      document.getElementById('musicBtn').classList.add('pause');
    } else {
      this.music.play();
      this.isPlaying = true;
      document.getElementById('musicBtn').textContent = '🎵';
      document.getElementById('musicBtn').classList.remove('pause');
    }
  }

  playMusic() {
    this.music.volume = 0.3;
    this.music.play().catch(() => {}); // Ignore autoplay errors
    this.isPlaying = true;
  }

  toggleItem(item) {
    const isSelected = item.classList.toggle('sel');
    const cb = item.querySelector('.cb');
    const data = {
      name: item.querySelector('.item-name').textContent,
      price: parseInt(item.dataset.price),
      qty: 1,
      element: item
    };

    if (isSelected) {
      this.cart.push(data);
    } else {
      this.cart = this.cart.filter(cartItem => cartItem.element !== item);
    }
    this.updateUI();
  }

  changeQty(btn) {
    const item = btn.closest('.item');
    const qtyNum = item.querySelector('.qty-num');
    let qty = parseInt(qtyNum.textContent);
    
    if (btn.textContent === '-') {
      qty = Math.max(1, qty - 1);
    } else {
      qty++;
    }
    
    qtyNum.textContent = qty;
    
    // Update cart
    const cartItem = this.cart.find(item => item.element === btn.closest('.item'));
    if (cartItem) cartItem.qty = qty;
    
    this.updateUI();
  }

  updateUI() {
    const totalItems = this.cart.reduce((sum, item) => sum + item.qty, 0);
    const totalPrice = this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

    // Update counts
    document.getElementById('gpCount').textContent = this.cart.filter(item => 
      item.element.closest('.panel-red')).reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cashCount').textContent = this.cart.filter(item => 
      item.element.closest('.panel-blue')).reduce((sum, item) => sum + item.qty, 0);

    // Update order bar
    document.getElementById('totalPrice').textContent = totalPrice.toLocaleString();
    document.getElementById('itemCount').textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
    
    // Show/hide order bar
    document.getElementById('orderBar').classList.toggle('on', totalItems > 0);

    // Update chips
    this.updateChips();
  }

  updateChips() {
    const chips = document.getElementById('chips');
    chips.innerHTML = '';

    this.cart.forEach((item, index) => {
      if (index > 4) return; // Limit chips
      const chip = document.createElement('div');
      chip.className = `chip chip-${item.element.closest('.panel-red') ? 'gp' : 'cash'}`;
      chip.innerHTML = `
        ${item.name} x<span class="chip-qty">${item.qty}</span>
        <span class="chip-x" onclick="kpcStore.removeItem(${index})">&times;</span>
      `;
      chips.appendChild(chip);
    });
  }

  removeItem(index) {
    const item = this.cart[index];
    if (item) {
      item.element.classList.remove('sel');
      this.cart.splice(index, 1);
      this.updateUI();
    }
  }

  sendOrder() {
    if (this.cart.length === 0) return;

    const orderText = this.cart.map(item => 
      `${item.name} x${item.qty} = Rp${(item.price * item.qty).toLocaleString()}`
    ).join('\n');
    
    const total = this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    const message = `🏁 *KPC STORE ORDER*\n\n${orderText}\n\n💰 *TOTAL: Rp${total.toLocaleString()}*\n\n⏰ *Drag racing ready!*`;
    
    const waUrl = `https://wa.me/6281234567890?text=${encodeURIComponent(message)}`;
    window.open(waUrl, '_blank');
    
    this.showToast('✅ Order dikirim ke WA!');
  }

  showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show success';
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }
}

// Initialize store
const kpcStore = new KPCStore();
</script>
</body>
</html>
