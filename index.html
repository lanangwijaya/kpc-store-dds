<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAG DRIVE STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* BACKGROUND ANIMASI */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #0ea5e9 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveBg 20s linear infinite;
  opacity: 0.1;
}
@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* JUDUL */
h1 {
  margin: 20px;
  font-size: 30px;
  background: linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #38bdf8; }
  to { text-shadow: 0 0 20px #22c55e; }
}

.section {
  font-size: 22px;
  margin-top: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,255,255,0.1);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px cyan;
}

/* GAMBAR */
.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* TOMBOL */
button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.buy { background: #22c55e; }
.wa { background: #25D366; }
.qris { background: #facc15; }
</style>
</head>

<body>

<h1>🏁 DRAG DRIVE STORE</h1>

<div class="section">🚗 GAMEPASS</div>
<div class="container">

<div class="card">
<img src="https://i.imgur.com/8Km9tLL.png">
<h3>Radio</h3><p>4 yebu</p>
<button class="buy" onclick="beli('LINK_RADIO')">Beli</button>
<button class="wa" onclick="wa('Radio - 4 yebu')">WA</button>
</div>

<div class="card">
<img src="https://i.imgur.com/Z6X6K0f.png">
<h3>Suspensi</h3><p>4 yebu</p>
<button class="buy" onclick="beli('LINK_SUSPENSI')">Beli</button>
<button class="wa" onclick="wa('Suspensi - 4 yebu')">WA</button>
</div>

<div class="card">
<img src="https://i.imgur.com/2DhmtJ4.png">
<h3>Paint</h3><p>7 yebu</p>
<button class="buy" onclick="beli('LINK_PAINT')">Beli</button>
<button class="wa" onclick="wa('Paint - 7 yebu')">WA</button>
</div>

<div class="card">
<img src="https://i.imgur.com/U3vTGjX.png">
<h3>Luxury</h3><p>13 yebu</p>
<button class="buy" onclick="beli('LINK_LUXURY')">Beli</button>
<button class="wa" onclick="wa('Luxury - 13 yebu')">WA</button>
</div>

<div class="card">
<img src="https://i.imgur.com/yW2W9SC.png">
<h3>Polisi</h3><p>15 yebu</p>
<button class="buy" onclick="beli('LINK_POLISI')">Beli</button>
<button class="wa" onclick="wa('Polisi - 15 yebu')">WA</button>
</div>

</div>

<div class="section">💰 CASH</div>
<div class="container">

<div class="card">
<img src="https://i.imgur.com/Q9Z6yXG.png">
<h3>1jt</h3><p>1 yebu</p>
<button class="wa" onclick="wa('Cash 1jt - 1 yebu')">Beli</button>
</div>

<div class="card">
<img src="https://i.imgur.com/Q9Z6yXG.png">
<h3>5jt</h3><p>3 yebu</p>
<button class="wa" onclick="wa('Cash 5jt - 3 yebu')">Beli</button>
</div>

</div>

<div style="padding:20px">
<h2>💳 PEMBAYARAN</h2>
<button class="wa" onclick="wa('Halo saya mau bayar')">💬 WhatsApp</button>
<button class="qris" onclick="qris()">📷 QRIS</button>
</div>

<script>
function beli(link){
  window.open(link, "_blank");
}

function wa(item){
  window.open("https://wa.me/628XXXXXXXXXX?text=Halo saya mau beli "+item, "_blank");
}

function qris(){
  window.open("LINK_QRIS_KAMU", "_blank");
}
</script>

</body>
</html>
