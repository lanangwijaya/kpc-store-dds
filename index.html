<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Drive Store</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  background: url('https://i.imgur.com/yW2W9SC.png') no-repeat center/cover;
}

/* overlay gelap */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
}

/* container utama */
.main {
  position:relative;
  padding:20px;
}

/* JUDUL */
.title {
  text-align:center;
  font-size:30px;
  font-weight:bold;
  margin-bottom:20px;
  background: linear-gradient(90deg,orange,red);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px red;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* PANEL */
.panel {
  border-radius:15px;
  padding:15px;
  backdrop-filter: blur(5px);
}

/* GAMEPASS MERAH */
.red {
  background: rgba(255,0,0,0.2);
  border:1px solid red;
  box-shadow:0 0 20px red;
}

/* CASH BIRU */
.blue {
  background: rgba(0,150,255,0.2);
  border:1px solid cyan;
  box-shadow:0 0 20px cyan;
}

/* ITEM */
.item {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

/* TOMBOL */
.btn {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.wa { background:#25D366; }
.qris { background:#facc15; }

/* HOVER */
.btn:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="main">

<div class="title">🏁 DRAG DRIVE STORE</div>

<div class="grid">

<!-- GAMEPASS -->
<div class="panel red">
<h2>🚗 GAMEPASS</h2>

<div class="item">Radio <span>4 yebu</span></div>
<div class="item">Suspensi <span>4 yebu</span></div>
<div class="item">Paint <span>7 yebu</span></div>
<div class="item">Aksesoris <span>7 yebu</span></div>
<div class="item">Plat <span>8 yebu</span></div>
<div class="item">Velg <span>8 yebu</span></div>
<div class="item">Slot <span>9 yebu</span></div>
<div class="item">Drag <span>10 yebu</span></div>
<div class="item">Luxury <span>13 yebu</span></div>
<div class="item">Polisi <span>15 yebu</span></div>
<div class="item">2x Gaji <span>45 yebu</span></div>

<button class="btn wa" onclick="wa('Gamepass')">Beli Gamepass</button>
</div>

<!-- CASH -->
<div class="panel blue">
<h2>💰 CASH</h2>

<div class="item">1jt <span>1 yebu</span></div>
<div class="item">5jt <span>3 yebu</span></div>
<div class="item">10jt <span>5 yebu</span></div>
<div class="item">50jt <span>7 yebu</span></div>
<div class="item">100jt <span>10 yebu</span></div>
<div class="item">500jt <span>37 yebu</span></div>
<div class="item">1M <span>70 yebu</span></div>

<button class="btn wa" onclick="wa('Cash')">Beli Cash</button>
</div>

</div>

<div style="margin-top:20px">
<button class="btn wa" onclick="wa('Halo saya mau beli')">💬 WhatsApp</button>
<button class="btn qris" onclick="qris()">📷 QRIS</button>
</div>

</div>

<script>
function wa(item){
  window.open("https://wa.me/628XXXXXXXXXX?text=Halo saya mau beli "+item);
}

function qris(){
  window.open("LINK_QRIS_KAMU");
}
</script>

</body>
</html>
